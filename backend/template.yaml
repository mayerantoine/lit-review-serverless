AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Literature Review Serverless - Lambda functions and DynamoDB

Parameters:
  OpenAIApiKeyArn:
    Type: String
    Description: ARN of the Secrets Manager secret containing the OpenAI API key
    Default: ""
  AgentCoreRetrieveRankArn:
    Type: String
    Description: AgentCore Runtime ARN for the retrieve-rank agent (set after agent deployment)
    Default: ""
  AgentCoreGenerateArn:
    Type: String
    Description: AgentCore Runtime ARN for the generate agent (set after agent deployment)
    Default: ""
  S3VectorBucket:
    Type: String
    Description: S3 Vectors bucket name
    Default: ""
  S3DataBucket:
    Type: String
    Description: S3 bucket for paper documents (JSON)
    Default: ""
  S3CsvBucket:
    Type: String
    Description: S3 bucket for uploaded CSV files
    Default: ""

Conditions:
  HasRetrieveRankArn: !Not [!Equals [!Ref AgentCoreRetrieveRankArn, ""]]
  HasGenerateArn: !Not [!Equals [!Ref AgentCoreGenerateArn, ""]]

Globals:
  Function:
    Runtime: python3.12
    Architectures:
      - x86_64
    Environment:
      Variables:
        DYNAMODB_TABLE: !Ref SessionsTable
        DEFAULT_AWS_REGION: !Ref AWS::Region
        S3_VECTOR: !Ref S3VectorBucket
        BEDROCK_KNOWLEDGE_S3_DATA: !Ref S3DataBucket
        S3_DATA_CSV: !Ref S3CsvBucket

Resources:

  # --------------------------------------------------------------------------
  # DynamoDB Table
  # --------------------------------------------------------------------------
  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: LitReviewSessions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # --------------------------------------------------------------------------
  # Shared Lambda Layer
  # --------------------------------------------------------------------------
  SharedCodeLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: lit-review-shared
      Description: Shared pipeline, vectorstore, s3_storage, config, dynamodb_session
      ContentUri: shared/
      CompatibleRuntimes:
        - python3.12
      RetentionPolicy: Delete
    Metadata:
      BuildMethod: makefile

  # --------------------------------------------------------------------------
  # API Gateway (HTTP API)
  # --------------------------------------------------------------------------
  LitReviewApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowHeaders:
          - Content-Type
          - X-Amz-Date
          - Authorization
        AllowMethods:
          - GET
          - POST
          - OPTIONS

  # --------------------------------------------------------------------------
  # Lambda 1a — Upload (fast, <30s, API Gateway trigger)
  # --------------------------------------------------------------------------
  UploadIndexFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: lit-review-upload-index
      CodeUri: lambdas/upload_index/
      Handler: handler.lambda_handler
      Timeout: 29
      MemorySize: 512
      Layers:
        - !Ref SharedCodeLayer
      Environment:
        Variables:
          INDEX_FUNCTION_NAME: !Ref BuildIndexFunction
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - S3CrudPolicy:
            BucketName: !Ref S3CsvBucket
        - Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !GetAtt BuildIndexFunction.Arn
      Events:
        UploadAndIndex:
          Type: HttpApi
          Properties:
            ApiId: !Ref LitReviewApi
            Path: /api/upload-and-index
            Method: POST

  # --------------------------------------------------------------------------
  # Lambda 1b — Build Index (heavy, async, no API Gateway)
  # --------------------------------------------------------------------------
  BuildIndexFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: lit-review-build-index
      CodeUri: lambdas/upload_index/
      Handler: handler.build_index_handler
      Timeout: 900
      MemorySize: 2048
      Layers:
        - !Ref SharedCodeLayer
      Environment:
        Variables:
          OPENAI_API_KEY: !Sub "{{resolve:secretsmanager:${OpenAIApiKeyArn}:SecretString:api_key}}"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - S3CrudPolicy:
            BucketName: !Ref S3CsvBucket
        - S3CrudPolicy:
            BucketName: !Ref S3DataBucket
        - Statement:
            - Effect: Allow
              Action:
                - s3vectors:CreateIndex
                - s3vectors:PutVectors
                - s3vectors:QueryVectors
                - s3vectors:GetVectors
                - s3vectors:ListIndexes
              Resource: "*"
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref OpenAIApiKeyArn

  # --------------------------------------------------------------------------
  # Lambda 1c — Session Status (fast poll endpoint)
  # --------------------------------------------------------------------------
  SessionStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: lit-review-session-status
      CodeUri: lambdas/session_status/
      Handler: handler.lambda_handler
      Timeout: 10
      MemorySize: 128
      Layers:
        - !Ref SharedCodeLayer
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SessionsTable
      Events:
        GetStatus:
          Type: HttpApi
          Properties:
            ApiId: !Ref LitReviewApi
            Path: /api/session/{session_id}/status
            Method: GET

  RankedPapersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: lit-review-ranked-papers
      CodeUri: lambdas/session_status/
      Handler: handler.ranked_papers_handler
      Timeout: 10
      MemorySize: 256
      Layers:
        - !Ref SharedCodeLayer
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SessionsTable
        - S3ReadPolicy:
            BucketName: !Ref S3DataBucket
      Events:
        GetRankedPapers:
          Type: HttpApi
          Properties:
            ApiId: !Ref LitReviewApi
            Path: /api/session/{session_id}/ranked-papers
            Method: GET

  # --------------------------------------------------------------------------
  # Lambda 2a — Retrieve & Rank API handler (fast, <30s)
  # --------------------------------------------------------------------------
  RetrieveRankFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: lit-review-retrieve-rank
      CodeUri: lambdas/retrieve_rank/
      Handler: handler.lambda_handler
      Timeout: 29
      MemorySize: 256
      Layers:
        - !Ref SharedCodeLayer
      Environment:
        Variables:
          AGENTCORE_RETRIEVE_RANK_ARN: !Ref AgentCoreRetrieveRankArn
          RANK_WORKER_FUNCTION: !Ref RankWorkerFunction
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !GetAtt RankWorkerFunction.Arn
      Events:
        RetrieveAndRank:
          Type: HttpApi
          Properties:
            ApiId: !Ref LitReviewApi
            Path: /api/retrieve-and-rank
            Method: POST

  # --------------------------------------------------------------------------
  # Lambda 2b — Rank Worker (async, 300s, calls AgentCore)
  # --------------------------------------------------------------------------
  RankWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: lit-review-rank-worker
      CodeUri: lambdas/retrieve_rank/
      Handler: handler.rank_worker_handler
      Timeout: 300
      MemorySize: 512
      Layers:
        - !Ref SharedCodeLayer
      Environment:
        Variables:
          AGENTCORE_RETRIEVE_RANK_ARN: !Ref AgentCoreRetrieveRankArn
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock-agentcore:InvokeAgentRuntime
              Resource:
                - !If
                  - HasRetrieveRankArn
                  - !Ref AgentCoreRetrieveRankArn
                  - "*"
                - !If
                  - HasRetrieveRankArn
                  - !Sub "${AgentCoreRetrieveRankArn}/*"
                  - "*"

  # --------------------------------------------------------------------------
  # Lambda 3 — Generate (AgentCore wrapper, streaming via Function URL)
  # --------------------------------------------------------------------------
  GenerateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: lit-review-generate
      CodeUri: lambdas/generate/
      Handler: handler.lambda_handler
      Timeout: 900
      MemorySize: 512
      Layers:
        - !Ref SharedCodeLayer
      Environment:
        Variables:
          OPENAI_API_KEY: !Sub "{{resolve:secretsmanager:${OpenAIApiKeyArn}:SecretString:api_key}}"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - S3ReadPolicy:
            BucketName: !Ref S3DataBucket
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref OpenAIApiKeyArn
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: BUFFERED
        Cors:
          AllowOrigins:
            - "*"
          AllowHeaders:
            - Content-Type
          AllowMethods:
            - POST

Outputs:
  ApiGatewayUrl:
    Description: API Gateway URL for upload-and-index and retrieve-and-rank endpoints
    Value: !Sub "https://${LitReviewApi}.execute-api.${AWS::Region}.amazonaws.com"
  GenerateFunctionUrl:
    Description: Lambda Function URL for streaming generate endpoint
    Value: !GetAtt GenerateFunctionUrl.FunctionUrl
  SessionsTableName:
    Description: DynamoDB table name
    Value: !Ref SessionsTable
  SessionsTableArn:
    Description: DynamoDB table ARN
    Value: !GetAtt SessionsTable.Arn
